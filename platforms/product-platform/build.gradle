plugins {
    id("java-platform")
}

group = "io.micro-spring-boot.platforms"

javaPlatform.allowDependencies()

dependencies {
    api(platform("org.springframework.boot:spring-boot-dependencies:3.1.3"))
    api(platform("org.springframework.cloud:spring-cloud-dependencies:2022.0.4"))

    constraints {
        api("org.springdoc:springdoc-openapi-starter-webmvc-ui:2.2.0")
        api("io.hypersistence:hypersistence-utils-hibernate-62:3.5.2")
    }
}
